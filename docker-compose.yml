version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - db_data:/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/data.db

volumes:
  db_data:
    driver: local
