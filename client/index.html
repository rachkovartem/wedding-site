  <!-- svh fallback for older browsers: set --vh once, only re-run on orientation change.
       Intentionally NOT listening to resize — browser chrome sliding away on scroll
       must not trigger layout recalculation. -->
  <script>
    function setVh() {
      document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
    }
    setVh();
    window.addEventListener('orientationchange', function () {
      setTimeout(setVh, 100);
    });
  </script>
